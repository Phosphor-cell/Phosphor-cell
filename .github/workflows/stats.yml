name: Update profile stats

# Regenerates .github/assets/stats.svg from live GitHub data.
# Runs daily; if nothing changed, no commit happens.

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/generate_stats.py'
      - '.github/workflows/stats.yml'

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/generate_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain .github/assets/stats.svg) ]]; then
            git add .github/assets/stats.svg
            git commit -m "chore: regenerate stats badge"
            git push
          else
            echo "No changes to commit."
          fi
