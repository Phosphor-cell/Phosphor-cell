<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label=" Dev Bhatt ">
  <defs>
    <linearGradient id="bg-prof2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#16181c"/>
    </linearGradient>
    <linearGradient id="acc-prof2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c89858"/>
      <stop offset="50%" stop-color="#d4a468"/>
      <stop offset="100%" stop-color="#b88848"/>
    </linearGradient>
    <linearGradient id="acc-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c89858" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c89858" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c89858" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-prof2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid-prof2" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#1a1c20" stroke-width="0.5"/>
    </pattern>
    <pattern id="dot-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#1f2126"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="url(#bg-prof2)"/>
  <rect width="900" height="260" fill="url(#dot-pattern)" opacity="0.8"/>
  <rect width="900" height="260" fill="url(#grid-prof2)" opacity="0.4"/>

  <rect x="0" y="0" width="900" height="1" fill="url(#acc-fade)"/>
  <rect x="0" y="259" width="900" height="1" fill="url(#acc-fade)"/>

  <g fill="#2a2d34" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="10" text-anchor="end">
    <text x="48" y="58">01</text>
    <text x="48" y="82">02</text>
    <text x="48" y="106">03</text>
    <text x="48" y="142">04</text>
    <text x="48" y="190">05</text>
    <text x="48" y="226">06</text>
  </g>

  <line x1="66" y1="35" x2="66" y2="235" stroke="#1f2126" stroke-width="1"/>

  <circle cx="58" cy="138" r="2.5" fill="url(#acc-prof2)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <g font-family="JetBrains Mono, Menlo, Consolas, monospace">
    <text x="85" y="62" font-size="11" fill="#4a4d54">// signature</text>
    <text x="85" y="84" font-size="11" fill="#6a6258">struct <tspan fill="#a89878">developer</tspan> {</text>
    <text x="100" y="108" font-size="11" fill="#5a5249">name = <tspan fill="#c89858">"Dev Bhatt"</tspan>;</text>

    <text x="85" y="160" fill="#e8dcc8" font-size="44" font-weight="500" letter-spacing="-1" filter="url(#soft-glow)">
      Dev Bhatt
    </text>
    <rect x="327" y="120" width="10" height="46" fill="url(#acc-prof2)" filter="url(#glow-prof2)" opacity="0.92">
      <animate attributeName="opacity" values="0.92;0.92;0.0;0.0;0.92" dur="1.05s" repeatCount="indefinite"/>
    </rect>

    <text x="100" y="190" font-size="13" fill="#7a7268" letter-spacing="0">
      <tspan fill="#5a5249">role:</tspan>
      <tspan dx="6">systems engineer</tspan>
      <tspan fill="#5a5249" dx="12">+</tspan>
      <tspan dx="12">researcher</tspan>
    </text>

    <text x="85" y="216" font-size="11" fill="#6a6258">};</text>

    <text x="85" y="240" fill="#3a3d44" font-size="10" letter-spacing="1.5">
      <tspan fill="url(#acc-prof2)" opacity="0.7">●</tspan>
      <tspan dx="6">CALGARY</tspan>
      <tspan dx="12">·</tspan>
      <tspan dx="12">MRU</tspan>
      <tspan dx="12">·</tspan>
      <tspan dx="12">CS + DATA SCIENCE</tspan>
      <tspan dx="12">·</tspan>
      <tspan dx="12">BUILDING AXYLITH</tspan>
    </text>
  </g>

  <g font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="10" opacity="0.4">
    <text x="640" y="62" fill="#5a7280">// currently</text>
    <text x="640" y="80" fill="#a8a098">native research env</text>

    <text x="640" y="108" fill="#5a7280">// languages</text>
    <text x="640" y="126" fill="#a8a098">C++20 · Python · CUDA</text>

    <text x="640" y="154" fill="#5a7280">// graphics</text>
    <text x="640" y="172" fill="#a8a098">Vulkan 1.3 · SPIR-V</text>

    <text x="640" y="200" fill="#5a7280">// focus</text>
    <text x="640" y="218" fill="#a8a098">research tooling · GPU</text>

    <text x="640" y="240" fill="#3a3d44" font-size="9">pre-launch · pre-seed</text>
  </g>

  <rect x="897" y="20" width="2" height="220" fill="url(#acc-prof2)" opacity="0.3"/>
</svg>
