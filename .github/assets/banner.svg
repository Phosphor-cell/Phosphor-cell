<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220" role="img" aria-label="Dev Bhatt">
  <defs>
    <linearGradient id="bg-prof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0e10"/>
      <stop offset="100%" stop-color="#16181c"/>
    </linearGradient>
    <linearGradient id="acc-prof" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c89858"/>
      <stop offset="50%" stop-color="#d4a468"/>
      <stop offset="100%" stop-color="#b88848"/>
    </linearGradient>
    <filter id="glow-prof" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid-prof" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f2126" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="900" height="220" fill="url(#bg-prof)"/>
  <rect width="900" height="220" fill="url(#grid-prof)" opacity="0.6"/>
  <rect x="0" y="0" width="900" height="1" fill="url(#acc-prof)" opacity="0.4"/>
  <rect x="0" y="219" width="900" height="1" fill="url(#acc-prof)" opacity="0.4"/>

  <!-- Left gutter line numbers -->
  <g fill="#3a3d44" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="11" text-anchor="end">
    <text x="55" y="62">01</text>
    <text x="55" y="92">02</text>
    <text x="55" y="122">03</text>
    <text x="55" y="152">04</text>
    <text x="55" y="182">05</text>
  </g>
  <line x1="75" y1="40" x2="75" y2="195" stroke="#2a2d34" stroke-width="1"/>

  <!-- Wordmark: name -->
  <g font-family="JetBrains Mono, Menlo, Consolas, monospace">
    <text x="100" y="115" fill="#e8dcc8" font-size="54" font-weight="500" letter-spacing="-1">
      dev bhatt
    </text>

    <!-- Cursor at the end -->
    <rect x="445" y="72" width="11" height="54" fill="url(#acc-prof)" filter="url(#glow-prof)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.9;0.0;0.0;0.9" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <text x="100" y="148" fill="#8b8275" font-size="16" font-weight="400">
      systems engineering · research tooling · GPU compute
    </text>

    <text x="100" y="188" fill="#5a5249" font-size="11" letter-spacing="1.5">
      <tspan fill="url(#acc-prof)" opacity="0.7">●</tspan>
      <tspan dx="6">CALGARY · CANADA</tspan>
      <tspan dx="14">MRU · CS + DATA SCIENCE</tspan>
      <tspan dx="14">BUILDING AXYLITH</tspan>
    </text>
  </g>

  <!-- Right side annotations -->
  <g font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="11" opacity="0.35">
    <text x="700" y="62" fill="#6a7280">// currently building</text>
    <text x="700" y="82" fill="#888278">native research env</text>
    <text x="700" y="102" fill="#6a7280">// stack</text>
    <text x="700" y="122" fill="#888278">C++20 · Vulkan · CUDA</text>
    <text x="700" y="142" fill="#6a7280">// status</text>
    <text x="700" y="162" fill="#888278">pre-launch, pre-seed</text>
  </g>
</svg>
